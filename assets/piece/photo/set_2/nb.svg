<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="nb_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4A0A0A"/>
      <stop offset="40%" stop-color="#2D0505"/>
      <stop offset="80%" stop-color="#1A0202"/>
      <stop offset="100%" stop-color="#0D0101"/>
    </radialGradient>
    <linearGradient id="nb_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#CC2222" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CC2222" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nb_eye" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF8888"/>
      <stop offset="40%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <filter id="nb_glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="95" rx="20" ry="4" fill="#CC0000" opacity="0.25"/>

  <!-- Base -->
  <ellipse cx="50" cy="88" rx="20" ry="5" fill="url(#nb_body)"/>
  <ellipse cx="50" cy="86" rx="20" ry="5" fill="url(#nb_body)"/>
  <rect x="30" y="83" width="40" height="3" rx="1" fill="url(#nb_body)"/>
  <ellipse cx="50" cy="83" rx="20" ry="3.5" fill="#3D0808"/>
  <ellipse cx="50" cy="83" rx="18" ry="2.8" fill="url(#nb_body)"/>

  <!-- Neck column -->
  <path d="M36 83 Q34 72 37 64 Q41 56 50 54 Q59 56 63 64 Q66 72 64 83 Z" fill="url(#nb_body)"/>
  <path d="M36 83 Q34 72 37 64 Q41 56 50 54 Q59 56 63 64 Q66 72 64 83 Z" fill="url(#nb_shine)" opacity="0.5"/>

  <ellipse cx="50" cy="65" rx="14" ry="2.5" fill="#8B0000" opacity="0.9"/>

  <!-- Horse chest/neck -->
  <path d="M38 54 Q35 48 36 40 Q38 34 44 30 Q48 27 50 26 Q58 27 62 36 Q65 44 62 54 Z" fill="url(#nb_body)"/>
  <path d="M38 54 Q35 48 36 40 Q38 34 44 30 Q48 27 50 26 Q58 27 62 36 Q65 44 62 54 Z" fill="url(#nb_shine)" opacity="0.45"/>

  <!-- Horse head -->
  <path d="M44 30 Q40 22 42 16 Q45 10 52 9 Q60 9 63 15 Q66 21 62 29 Q58 34 50 33 Q46 33 44 30 Z" fill="url(#nb_body)"/>
  <path d="M44 30 Q40 22 42 16 Q45 10 52 9 Q60 9 63 15 Q66 21 62 29 Q58 34 50 33 Q46 33 44 30 Z" fill="url(#nb_shine)" opacity="0.5"/>

  <!-- Mane with red glow -->
  <path d="M60 30 Q63 26 62 20 Q60 14 55 11" stroke="#CC0000" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M58 32 Q62 27 61 21" stroke="#FF4444" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Nostril -->
  <ellipse cx="44" cy="26" rx="2" ry="1.5" fill="#5A0000" opacity="0.7"/>

  <!-- Glowing red eye -->
  <circle cx="55" cy="16" r="3.5" fill="url(#nb_eye)" filter="url(#nb_glow)"/>
  <circle cx="55" cy="16" r="1.5" fill="#FF8888" opacity="0.9"/>

  <!-- Ear -->
  <path d="M57 10 L60 6 L64 10" fill="url(#nb_body)" stroke="#8B0000" stroke-width="1"/>

  <!-- Red crown detail -->
  <path d="M48 13 Q52 10 57 11" stroke="#CC0000" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- Body highlight -->
  <ellipse cx="41" cy="68" rx="2.5" ry="6" fill="#FF4444" opacity="0.15" transform="rotate(-10,41,68)"/>
</svg>
