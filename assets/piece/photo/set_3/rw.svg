<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="rwS_stone" cx="35%" cy="25%" r="72%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="30%" stop-color="#CFD8DC"/>
      <stop offset="65%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#455A64"/>
    </radialGradient>
    <linearGradient id="rwS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#455A64" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#455A64" stop-opacity="0"/>
      <stop offset="100%" stop-color="#263238" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="rwS_gold" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#FFF9C4"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <filter id="rwS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#263238" flood-opacity="0.4"/></filter>
    <filter id="rwS_glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="26" ry="5" fill="#263238" opacity="0.3"/>

  <!-- BASE -->
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#rwS_shadow)"/>
  <line x1="22" y1="113" x2="78" y2="113" stroke="#90A4AE" stroke-width="0.5" opacity="0.6"/>
  <rect x="22" y="99"  width="56" height="10" rx="2" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="22" y="99"  width="56" height="10" rx="2" fill="url(#rwS_shadow)"/>

  <!-- LOWER WIDE COLUMN / PLINTH -->
  <rect x="26" y="75" width="48" height="25" rx="2" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="26" y="75" width="48" height="25" rx="2" fill="url(#rwS_shadow)"/>
  <!-- Stone block lines on plinth -->
  <line x1="28" y1="83" x2="72" y2="83" stroke="#78909C" stroke-width="0.6" opacity="0.5"/>
  <line x1="28" y1="91" x2="72" y2="91" stroke="#78909C" stroke-width="0.6" opacity="0.5"/>
  <line x1="45" y1="75" x2="45" y2="99" stroke="#78909C" stroke-width="0.5" opacity="0.4"/>
  <line x1="55" y1="75" x2="55" y2="99" stroke="#78909C" stroke-width="0.5" opacity="0.4"/>
  <!-- Gold trim ring -->
  <rect x="26" y="74" width="48" height="3" rx="1" fill="url(#rwS_gold)" opacity="0.8"/>

  <!-- TOWER BODY (narrower mid section) -->
  <rect x="30" y="38" width="40" height="38" rx="1.5" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="30" y="38" width="40" height="38" rx="1.5" fill="url(#rwS_shadow)"/>
  <!-- Tower wall stone blocks -->
  <line x1="32" y1="48" x2="68" y2="48" stroke="#78909C" stroke-width="0.7" opacity="0.5"/>
  <line x1="32" y1="58" x2="68" y2="58" stroke="#78909C" stroke-width="0.7" opacity="0.5"/>
  <line x1="32" y1="68" x2="68" y2="68" stroke="#78909C" stroke-width="0.7" opacity="0.5"/>
  <!-- Vertical stone seam -->
  <line x1="43" y1="38" x2="43" y2="75" stroke="#78909C" stroke-width="0.5" opacity="0.35"/>
  <line x1="50" y1="38" x2="50" y2="75" stroke="#90A4AE" stroke-width="0.4" opacity="0.3"/>
  <line x1="57" y1="38" x2="57" y2="75" stroke="#78909C" stroke-width="0.5" opacity="0.35"/>
  <!-- Arched window on tower -->
  <path d="M44,55 Q50,50 56,55 L56,68 L44,68 Z" fill="#37474F" opacity="0.6"/>
  <path d="M44,55 Q50,50 56,55" stroke="#90A4AE" stroke-width="0.8" fill="none"/>
  <!-- Window glow -->
  <path d="M45,56 Q50,52 55,56 L55,67 L45,67 Z" fill="#FFF8E1" opacity="0.15"/>

  <!-- Gold band at tower base -->
  <rect x="30" y="37" width="40" height="3" rx="1" fill="url(#rwS_gold)" opacity="0.8"/>

  <!-- CRENELLATIONS TOP (detailed battlements) -->
  <!-- Top platform -->
  <rect x="26" y="28" width="48" height="11" rx="1" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="26" y="28" width="48" height="11" rx="1" fill="url(#rwS_shadow)"/>
  <!-- 3 merlons (solid) + 2 crenels (gaps) -->
  <rect x="26" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="26" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_shadow)"/>
  <rect x="43" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="43" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_shadow)"/>
  <rect x="60" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_stone)" filter="url(#rwS_depth)"/>
  <rect x="60" y="14" width="14" height="15" rx="1.5" fill="url(#rwS_shadow)"/>
  <!-- Crenel gaps (darker) -->
  <rect x="40" y="14" width="3" height="12" rx="0.5" fill="#263238" opacity="0.8"/>
  <rect x="57" y="14" width="3" height="12" rx="0.5" fill="#263238" opacity="0.8"/>
  <!-- Stone detail lines on merlons -->
  <line x1="28" y1="20" x2="38" y2="20" stroke="#78909C" stroke-width="0.5" opacity="0.5"/>
  <line x1="45" y1="20" x2="55" y2="20" stroke="#78909C" stroke-width="0.5" opacity="0.5"/>
  <line x1="62" y1="20" x2="72" y2="20" stroke="#78909C" stroke-width="0.5" opacity="0.5"/>
  <!-- Arrow slits in merlons -->
  <rect x="32" y="15" width="2" height="7" rx="0.5" fill="#455A64" opacity="0.7"/>
  <rect x="49" y="15" width="2" height="7" rx="0.5" fill="#455A64" opacity="0.7"/>
  <rect x="66" y="15" width="2" height="7" rx="0.5" fill="#455A64" opacity="0.7"/>
  <!-- Gold trimming on battlements -->
  <line x1="26" y1="28" x2="74" y2="28" stroke="#FFD54F" stroke-width="0.8" opacity="0.7"/>
  <line x1="26" y1="14" x2="74" y2="14" stroke="#FFD54F" stroke-width="0.6" opacity="0.5"/>

  <!-- CROSSED SWORD decoration on tower face -->
  <line x1="42" y1="44" x2="58" y2="72" stroke="#90A4AE" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="44" x2="42" y2="72" stroke="#90A4AE" stroke-width="1.2" opacity="0.5"/>
  <!-- Shield crest in center of cross -->
  <path d="M47,55 L50,52 L53,55 L53,61 Q50,64 47,61 Z" fill="url(#rwS_gold)" opacity="0.7" filter="url(#rwS_glow)"/>
</svg>
