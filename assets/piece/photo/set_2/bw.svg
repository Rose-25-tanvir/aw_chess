<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bw_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFEF0"/>
      <stop offset="40%" stop-color="#F5E6B0"/>
      <stop offset="80%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="bw_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bw_orb" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <filter id="bw_glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="95" rx="20" ry="4" fill="#B8860B" opacity="0.35"/>

  <!-- Base -->
  <ellipse cx="50" cy="88" rx="20" ry="5" fill="url(#bw_body)"/>
  <ellipse cx="50" cy="86" rx="20" ry="5" fill="url(#bw_body)"/>
  <rect x="30" y="83" width="40" height="3" rx="1" fill="url(#bw_body)"/>
  <ellipse cx="50" cy="83" rx="20" ry="3.5" fill="#F5E6B0"/>
  <ellipse cx="50" cy="83" rx="18" ry="2.8" fill="url(#bw_body)"/>

  <!-- Body - tapered column -->
  <path d="M33 83 Q32 72 35 63 Q38 55 50 53 Q62 55 65 63 Q68 72 67 83 Z" fill="url(#bw_body)"/>
  <path d="M33 83 Q32 72 35 63 Q38 55 50 53 Q62 55 65 63 Q68 72 67 83 Z" fill="url(#bw_shine)" opacity="0.4"/>

  <!-- Mid band -->
  <ellipse cx="50" cy="64" rx="14" ry="2.5" fill="#D4A843" opacity="0.8"/>

  <!-- Neck - thin column -->
  <path d="M40 53 Q38 46 40 38 Q43 32 50 30 Q57 32 60 38 Q62 46 60 53 Z" fill="url(#bw_body)"/>
  <path d="M40 53 Q38 46 40 38 Q43 32 50 30 Q57 32 60 38 Q62 46 60 53 Z" fill="url(#bw_shine)" opacity="0.35"/>

  <!-- Upper band -->
  <ellipse cx="50" cy="53" rx="10" ry="2.5" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="50" cy="30" rx="9" ry="2.5" fill="#D4A843" opacity="0.8"/>

  <!-- Head - angled mitre shape (bishop hat) -->
  <path d="M50 10 L40 28 Q45 32 50 31 Q55 32 60 28 Z" fill="url(#bw_body)"/>
  <path d="M50 10 L40 28 Q45 32 50 31 Q55 32 60 28 Z" fill="url(#bw_shine)" opacity="0.5"/>

  <!-- Mitre top finial orb -->
  <circle cx="50" cy="10" r="4" fill="url(#bw_orb)" filter="url(#bw_glow)"/>
  <circle cx="50" cy="10" r="2" fill="#FFFFFF" opacity="0.9"/>

  <!-- Mitre slit line -->
  <line x1="50" y1="14" x2="50" y2="29" stroke="#B8860B" stroke-width="1.5" opacity="0.6"/>

  <!-- Body highlight -->
  <ellipse cx="43" cy="68" rx="2.5" ry="5" fill="#FFFFFF" opacity="0.2" transform="rotate(-15,43,68)"/>
</svg>
