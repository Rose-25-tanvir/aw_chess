<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="qbS_body" cx="38%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#546E7A"/>
      <stop offset="30%" stop-color="#37474F"/>
      <stop offset="70%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#090E10"/>
    </radialGradient>
    <radialGradient id="qbS_face" cx="38%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#455A64"/>
      <stop offset="50%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#0D1B20"/>
    </radialGradient>
    <radialGradient id="qbS_silver" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <linearGradient id="qbS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="qbS_dress" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#37474F"/>
      <stop offset="40%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#050D10"/>
    </linearGradient>
    <radialGradient id="qbS_magic" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </radialGradient>
    <filter id="qbS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/></filter>
    <filter id="qbS_glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#EA80FC" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="qbS_eyeglow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feFlood flood-color="#CE93D8" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="26" ry="5" fill="#000000" opacity="0.45"/>

  <!-- BASE -->
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#qbS_body)" filter="url(#qbS_depth)"/>
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#qbS_shadow)"/>
  <rect x="24" y="99" width="52" height="10" rx="2" fill="url(#qbS_body)" filter="url(#qbS_depth)"/>

  <!-- Dark flowing sorceress dress -->
  <path d="M22,99 Q15,85 18,67 Q22,50 32,44 Q38,41 50,40 Q62,41 68,44 Q78,50 82,67 Q85,85 78,99 Z"
        fill="url(#qbS_dress)" filter="url(#qbS_depth)"/>
  <path d="M22,99 Q15,85 18,67 Q22,50 32,44 Q38,41 50,40 Q62,41 68,44 Q78,50 82,67 Q85,85 78,99 Z"
        fill="url(#qbS_shadow)"/>
  <!-- Dress shadows/folds -->
  <path d="M50,41 L47,70 L45,99" stroke="#37474F" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,41 L53,70 L55,99" stroke="#37474F" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M22,99 Q25,83 28,68 Q31,54 36,46" stroke="#546E7A" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M78,99 Q75,83 72,68 Q69,54 64,46" stroke="#263238" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Magic rune lines on dress -->
  <path d="M35,85 L40,78 L35,71 L42,65" stroke="#9C27B0" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M65,85 L60,78 L65,71 L58,65" stroke="#9C27B0" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Bottom hem trail of magic -->
  <path d="M22,99 Q30,95 50,94 Q70,95 78,99" stroke="#7B1FA2" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Purple magic belt -->
  <path d="M36,66 Q50,62 64,66 L64,72 Q50,68 36,72 Z" fill="url(#qbS_magic)" filter="url(#qbS_glow)"/>
  <circle cx="50" cy="69" r="3.5" fill="#CE93D8" filter="url(#qbS_glow)"/>
  <circle cx="50" cy="69" r="2" fill="#FFFFFF" opacity="0.8"/>

  <!-- LEFT ARM - dark shadow arm -->
  <path d="M32,57 Q22,53 18,46 Q16,40 20,36 Q25,33 31,37 Q34,42 35,52 Z"
        fill="url(#qbS_dress)" filter="url(#qbS_depth)"/>
  <!-- Dark magic orb in hand -->
  <circle cx="15" cy="40" r="6" fill="url(#qbS_magic)" filter="url(#qbS_glow)"/>
  <circle cx="15" cy="40" r="3.5" fill="#CE93D8" opacity="0.6"/>
  <circle cx="13" cy="38" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- Swirling magic energy -->
  <path d="M11,38 Q13,36 17,38 Q15,42 11,40" stroke="#EA80FC" stroke-width="0.6" fill="none" opacity="0.7"/>

  <!-- RIGHT ARM -->
  <path d="M68,57 Q78,53 82,46 Q84,40 80,36 Q75,33 69,37 Q66,42 65,52 Z"
        fill="url(#qbS_dress)" filter="url(#qbS_depth)"/>
  <!-- Dark staff of power -->
  <rect x="83" y="22" width="3" height="26" rx="1.5" fill="url(#qbS_body)"/>
  <!-- Staff skull top -->
  <ellipse cx="84.5" cy="20" rx="5" ry="6" fill="url(#qbS_body)" filter="url(#qbS_depth)"/>
  <circle cx="82.5" cy="18.5" r="1.5" fill="#CE93D8" filter="url(#qbS_glow)"/>
  <circle cx="86.5" cy="18.5" r="1.5" fill="#CE93D8" filter="url(#qbS_glow)"/>
  <path d="M81,22 Q84.5,24 88,22" stroke="#546E7A" stroke-width="0.7" fill="none"/>

  <!-- DARK BODICE -->
  <path d="M36,46 Q38,40 50,38 Q62,40 64,46 Q62,55 50,57 Q38,55 36,46 Z"
        fill="url(#qbS_body)" filter="url(#qbS_depth)"/>
  <path d="M36,46 Q38,40 50,38 Q62,40 64,46 Q62,55 50,57 Q38,55 36,46 Z" fill="url(#qbS_shadow)"/>
  <!-- Chain necklace from dark metal -->
  <path d="M40,44 Q44,41 50,40.5 Q56,41 60,44" stroke="#90A4AE" stroke-width="1" fill="none"/>
  <circle cx="40" cy="44" r="1" fill="#90A4AE"/>
  <circle cx="44" cy="42" r="0.9" fill="#78909C"/>
  <circle cx="50" cy="41" r="1.1" fill="#90A4AE"/>
  <circle cx="56" cy="42" r="0.9" fill="#78909C"/>
  <circle cx="60" cy="44" r="1" fill="#90A4AE"/>
  <!-- Dark gem pendant -->
  <circle cx="50" cy="48" r="4" fill="url(#qbS_magic)" filter="url(#qbS_glow)"/>
  <circle cx="50" cy="48" r="2.2" fill="#CE93D8" opacity="0.8"/>

  <!-- NECK -->
  <rect x="45" y="33" width="10" height="8" rx="3" fill="url(#qbS_face)" filter="url(#qbS_depth)"/>

  <!-- HEAD -->
  <ellipse cx="50" cy="24" rx="13" ry="14" fill="url(#qbS_face)" filter="url(#qbS_depth)"/>
  <ellipse cx="50" cy="24" rx="13" ry="14" fill="url(#qbS_shadow)"/>
  <!-- Dark hair (very dark swept back) -->
  <path d="M37,20 Q34,26 35,34 Q37,38 39,40" fill="#0D1B20" stroke="#263238" stroke-width="0.5"/>
  <path d="M63,20 Q66,26 65,34 Q63,38 61,40" fill="#090E10" stroke="#1C2A30" stroke-width="0.5"/>
  <!-- Dark hair top -->
  <path d="M38,16 Q50,10 62,16" fill="#0D1B20" opacity="0.8"/>
  <!-- GLOWING PURPLE EYES -->
  <path d="M42,22 Q44.5,20 47,22 Q44.5,24.5 42,22" fill="#9C27B0" filter="url(#qbS_eyeglow)"/>
  <path d="M53,22 Q55.5,20 58,22 Q55.5,24.5 53,22" fill="#9C27B0" filter="url(#qbS_eyeglow)"/>
  <circle cx="44.5" cy="22" r="1.3" fill="#CE93D8"/>
  <circle cx="55.5" cy="22" r="1.3" fill="#CE93D8"/>
  <circle cx="44" cy="21.5" r="0.6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="55" cy="21.5" r="0.6" fill="#FFFFFF" opacity="0.8"/>
  <!-- Dark lips -->
  <path d="M46,30 Q50,32.5 54,30" stroke="#7B1FA2" stroke-width="0.9" fill="none"/>
  <path d="M47,30 Q50,31.5 53,30" fill="#9C27B0" opacity="0.5"/>
  <!-- Sharp cheekbones -->
  <path d="M38,26 Q40,28 42,26" stroke="#37474F" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M62,26 Q60,28 58,26" stroke="#263238" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- DARK SORCERESS CROWN (shadow wings + gems) -->
  <!-- Crown base -->
  <rect x="36" y="9" width="28" height="6" rx="2" fill="url(#qbS_body)" stroke="#546E7A" stroke-width="0.6" filter="url(#qbS_depth)"/>
  <!-- Shadow wing extensions -->
  <path d="M36,11 Q28,8 24,4 Q26,10 30,13 Q33,12 36,11 Z" fill="#1C2A30" stroke="#37474F" stroke-width="0.5"/>
  <path d="M64,11 Q72,8 76,4 Q74,10 70,13 Q67,12 64,11 Z" fill="#0D1B20" stroke="#263238" stroke-width="0.5"/>
  <!-- Crown center tall spike -->
  <path d="M46,9 Q50,0 54,9" fill="url(#qbS_body)" stroke="#546E7A" stroke-width="0.7" filter="url(#qbS_depth)"/>
  <!-- Side spikes -->
  <polygon points="39,9 40,4 41,9" fill="url(#qbS_silver)" opacity="0.8"/>
  <polygon points="59,9 60,4 61,9" fill="url(#qbS_silver)" opacity="0.8"/>
  <!-- Crown gems -->
  <circle cx="50" cy="1.5" r="2.2" fill="#EA80FC" filter="url(#qbS_glow)"/>
  <circle cx="50" cy="1.5" r="1.2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="40" cy="4.5" r="1.5" fill="#9C27B0" filter="url(#qbS_glow)"/>
  <circle cx="60" cy="4.5" r="1.5" fill="#9C27B0" filter="url(#qbS_glow)"/>
  <circle cx="42" cy="12" r="1.2" fill="#CE93D8" opacity="0.9"/>
  <circle cx="50" cy="12" r="1.5" fill="#EA80FC" opacity="0.9"/>
  <circle cx="58" cy="12" r="1.2" fill="#CE93D8" opacity="0.9"/>
</svg>
