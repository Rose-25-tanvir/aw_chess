<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Black King: Deep Crimson-Black with Blood Red accents -->
    <radialGradient id="kb_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4A0A0A"/>
      <stop offset="40%" stop-color="#2D0505"/>
      <stop offset="80%" stop-color="#1A0202"/>
      <stop offset="100%" stop-color="#0D0101"/>
    </radialGradient>
    <radialGradient id="kb_base" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5C1010"/>
      <stop offset="50%" stop-color="#2D0505"/>
      <stop offset="100%" stop-color="#0D0101"/>
    </radialGradient>
    <linearGradient id="kb_cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="50%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#7A0000"/>
    </linearGradient>
    <linearGradient id="kb_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#CC2222" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CC2222" stop-opacity="0"/>
    </linearGradient>
    <filter id="kb_glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="95" rx="22" ry="4" fill="#CC0000" opacity="0.25"/>

  <!-- Base platform -->
  <ellipse cx="50" cy="88" rx="22" ry="5.5" fill="url(#kb_base)"/>
  <ellipse cx="50" cy="86" rx="22" ry="5.5" fill="url(#kb_base)"/>
  <rect x="28" y="82" width="44" height="4" rx="1" fill="url(#kb_base)"/>
  <ellipse cx="50" cy="82" rx="22" ry="4" fill="#3D0808"/>
  <ellipse cx="50" cy="82" rx="20" ry="3.2" fill="url(#kb_body)"/>

  <!-- Lower body skirt -->
  <path d="M30 82 Q28 70 32 62 Q36 55 50 53 Q64 55 68 62 Q72 70 70 82 Z" fill="url(#kb_body)"/>
  <path d="M30 82 Q28 70 32 62 Q36 55 50 53 Q64 55 68 62 Q72 70 70 82 Z" fill="url(#kb_shine)" opacity="0.5"/>

  <!-- Decorative red ring -->
  <ellipse cx="50" cy="64" rx="15" ry="2.5" fill="#8B0000" opacity="0.9"/>
  <ellipse cx="50" cy="64" rx="14" ry="2" fill="#CC0000" opacity="0.5"/>

  <!-- Torso -->
  <path d="M36 64 Q34 56 36 50 Q40 44 50 43 Q60 44 64 50 Q66 56 64 64 Z" fill="url(#kb_body)"/>
  <path d="M36 64 Q34 56 36 50 Q40 44 50 43 Q60 44 64 50 Q66 56 64 64 Z" fill="url(#kb_shine)" opacity="0.4"/>

  <!-- Neck ring -->
  <ellipse cx="50" cy="43" rx="11" ry="3" fill="#8B0000"/>
  <ellipse cx="50" cy="42" rx="9" ry="2" fill="#CC0000" opacity="0.7"/>

  <!-- Head -->
  <ellipse cx="50" cy="37" rx="10" ry="9" fill="url(#kb_body)"/>
  <ellipse cx="50" cy="37" rx="10" ry="9" fill="url(#kb_shine)" opacity="0.5"/>

  <!-- Crown ring -->
  <ellipse cx="50" cy="30" rx="9" ry="2.5" fill="#7A0000"/>
  <ellipse cx="50" cy="29.5" rx="8" ry="2" fill="#CC0000" opacity="0.5"/>

  <!-- Crown Cross with blood red glow -->
  <rect x="47.5" y="18" width="5" height="16" rx="2.5" fill="url(#kb_cross)" filter="url(#kb_glow)"/>
  <rect x="40" y="21.5" width="20" height="5" rx="2.5" fill="url(#kb_cross)" filter="url(#kb_glow)"/>
  <!-- Cross gems -->
  <circle cx="50" cy="19.5" r="2" fill="#FF6666" opacity="0.9"/>
  <circle cx="40.5" cy="24" r="1.5" fill="#CC0000" opacity="0.9"/>
  <circle cx="59.5" cy="24" r="1.5" fill="#CC0000" opacity="0.9"/>

  <!-- Red gem highlights on body -->
  <ellipse cx="44" cy="58" rx="3" ry="5" fill="#FF4444" opacity="0.15" transform="rotate(-15,44,58)"/>
  <ellipse cx="43" cy="36" rx="2" ry="4" fill="#FF4444" opacity="0.2" transform="rotate(-10,43,36)"/>
</svg>
