<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="rbS_stone" cx="35%" cy="25%" r="72%">
      <stop offset="0%"  stop-color="#546E7A"/>
      <stop offset="30%" stop-color="#37474F"/>
      <stop offset="65%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#060C0F"/>
    </radialGradient>
    <linearGradient id="rbS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="rbS_silver" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <radialGradient id="rbS_fire" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#FF6F00"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#4A0000"/>
    </radialGradient>
    <filter id="rbS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.7"/></filter>
    <filter id="rbS_fireglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#FF6D00" flood-opacity="0.7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="26" ry="5" fill="#000000" opacity="0.5"/>

  <!-- BASE -->
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="18" y="108" width="64" height="9" rx="3" fill="url(#rbS_shadow)"/>
  <rect x="22" y="99"  width="56" height="10" rx="2" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>

  <!-- PLINTH -->
  <rect x="26" y="75" width="48" height="25" rx="2" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="26" y="75" width="48" height="25" rx="2" fill="url(#rbS_shadow)"/>
  <line x1="28" y1="83" x2="72" y2="83" stroke="#37474F" stroke-width="0.7" opacity="0.6"/>
  <line x1="28" y1="91" x2="72" y2="91" stroke="#37474F" stroke-width="0.7" opacity="0.6"/>
  <line x1="45" y1="75" x2="45" y2="99" stroke="#37474F" stroke-width="0.5" opacity="0.4"/>
  <line x1="55" y1="75" x2="55" y2="99" stroke="#37474F" stroke-width="0.5" opacity="0.4"/>
  <!-- Silver dark trim -->
  <rect x="26" y="74" width="48" height="3" rx="1" fill="url(#rbS_silver)" opacity="0.6"/>

  <!-- TOWER BODY -->
  <rect x="30" y="38" width="40" height="38" rx="1.5" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="30" y="38" width="40" height="38" rx="1.5" fill="url(#rbS_shadow)"/>
  <!-- Dark stone seams -->
  <line x1="32" y1="48" x2="68" y2="48" stroke="#263238" stroke-width="0.8" opacity="0.6"/>
  <line x1="32" y1="58" x2="68" y2="58" stroke="#263238" stroke-width="0.8" opacity="0.6"/>
  <line x1="32" y1="68" x2="68" y2="68" stroke="#263238" stroke-width="0.8" opacity="0.6"/>
  <line x1="43" y1="38" x2="43" y2="75" stroke="#263238" stroke-width="0.5" opacity="0.4"/>
  <line x1="57" y1="38" x2="57" y2="75" stroke="#263238" stroke-width="0.5" opacity="0.4"/>
  <!-- Fire window opening -->
  <path d="M44,55 Q50,48 56,55 L56,68 L44,68 Z" fill="#4A0000" opacity="0.8"/>
  <path d="M44,55 Q50,48 56,55" stroke="#37474F" stroke-width="0.8" fill="none"/>
  <!-- FIRE glow from window -->
  <path d="M45,62 Q47,56 50,54 Q53,56 55,62 L55,67 L45,67 Z" fill="url(#rbS_fire)" filter="url(#rbS_fireglow)" opacity="0.8"/>
  <path d="M47,65 Q49,59 50,57 Q51,59 53,65" fill="#FF6F00" opacity="0.5"/>
  <!-- Silver trim at tower base -->
  <rect x="30" y="37" width="40" height="3" rx="1" fill="url(#rbS_silver)" opacity="0.6"/>

  <!-- DARK CRENELLATIONS -->
  <rect x="26" y="28" width="48" height="11" rx="1" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="26" y="28" width="48" height="11" rx="1" fill="url(#rbS_shadow)"/>
  <!-- 3 dark merlons with skull-like tops -->
  <rect x="26" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="26" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_shadow)"/>
  <!-- Skull face left merlon -->
  <circle cx="33" cy="16" r="4" fill="#1C2A30"/>
  <circle cx="31" cy="15" r="1.2" fill="#FF1744" opacity="0.7"/>
  <circle cx="35" cy="15" r="1.2" fill="#FF1744" opacity="0.7"/>
  <path d="M31,19 Q33,21 35,19" stroke="#37474F" stroke-width="0.7" fill="none"/>

  <rect x="43" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="43" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_shadow)"/>
  <!-- Skull face mid merlon -->
  <circle cx="50" cy="16" r="4" fill="#1C2A30"/>
  <circle cx="48" cy="15" r="1.2" fill="#FF1744" opacity="0.8"/>
  <circle cx="52" cy="15" r="1.2" fill="#FF1744" opacity="0.8"/>
  <path d="M48,19 Q50,21 52,19" stroke="#37474F" stroke-width="0.7" fill="none"/>

  <rect x="60" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_stone)" filter="url(#rbS_depth)"/>
  <rect x="60" y="12" width="14" height="17" rx="1.5" fill="url(#rbS_shadow)"/>
  <!-- Skull face right merlon -->
  <circle cx="67" cy="16" r="4" fill="#1C2A30"/>
  <circle cx="65" cy="15" r="1.2" fill="#FF1744" opacity="0.7"/>
  <circle cx="69" cy="15" r="1.2" fill="#FF1744" opacity="0.7"/>
  <path d="M65,19 Q67,21 69,19" stroke="#37474F" stroke-width="0.7" fill="none"/>

  <!-- Crenel gaps - glowing blood red -->
  <rect x="40" y="14" width="3" height="14" rx="0.5" fill="#4A0000"/>
  <rect x="57" y="14" width="3" height="14" rx="0.5" fill="#4A0000"/>
  <!-- fire in gaps -->
  <rect x="40.5" y="19" width="2" height="6" rx="0.5" fill="url(#rbS_fire)" filter="url(#rbS_fireglow)" opacity="0.7"/>
  <rect x="57.5" y="19" width="2" height="6" rx="0.5" fill="url(#rbS_fire)" filter="url(#rbS_fireglow)" opacity="0.7"/>

  <!-- Silver trim on battlements -->
  <line x1="26" y1="28" x2="74" y2="28" stroke="#78909C" stroke-width="0.8" opacity="0.6"/>
  <line x1="26" y1="12" x2="74" y2="12" stroke="#546E7A" stroke-width="0.6" opacity="0.5"/>

  <!-- Crossed dark swords on tower -->
  <line x1="42" y1="44" x2="58" y2="72" stroke="#546E7A" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="44" x2="42" y2="72" stroke="#546E7A" stroke-width="1.2" opacity="0.5"/>
  <!-- Dark skull crest -->
  <circle cx="50" cy="58" r="5" fill="#1C2A30" stroke="#37474F" stroke-width="0.5"/>
  <circle cx="48" cy="57" r="1.5" fill="#FF1744" opacity="0.8"/>
  <circle cx="52" cy="57" r="1.5" fill="#FF1744" opacity="0.8"/>
  <path d="M48,61 Q50,63 52,61" stroke="#37474F" stroke-width="0.8" fill="none"/>
</svg>
