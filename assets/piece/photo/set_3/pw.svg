<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="pwS_armor" cx="35%" cy="28%" r="72%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E0E8F0"/>
      <stop offset="65%" stop-color="#9EB3C0"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </radialGradient>
    <radialGradient id="pwS_face" cx="38%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#F5F0E8"/>
      <stop offset="50%" stop-color="#C8C0B0"/>
      <stop offset="100%" stop-color="#7A7468"/>
    </radialGradient>
    <radialGradient id="pwS_gold" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#FFF9C4"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="pwS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#455A64" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#455A64" stop-opacity="0"/>
      <stop offset="100%" stop-color="#263238" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="pwS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#263238" flood-opacity="0.35"/></filter>
    <filter id="pwS_glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="24" ry="5" fill="#263238" opacity="0.25"/>

  <!-- BASE -->
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#pwS_shadow)"/>
  <rect x="26" y="100" width="48" height="9" rx="2" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="26" y="100" width="48" height="9" rx="2" fill="url(#pwS_shadow)"/>

  <!-- LEGS (armored boots) -->
  <rect x="34" y="88" width="14" height="13" rx="2" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="34" y="88" width="14" height="13" rx="2" fill="url(#pwS_shadow)"/>
  <rect x="52" y="88" width="14" height="13" rx="2" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="52" y="88" width="14" height="13" rx="2" fill="url(#pwS_shadow)"/>
  <!-- Boot details -->
  <line x1="36" y1="93" x2="46" y2="93" stroke="#90A4AE" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="93" x2="64" y2="93" stroke="#90A4AE" stroke-width="0.5" opacity="0.5"/>
  <!-- Boot toe -->
  <ellipse cx="41" cy="100" rx="7" ry="2" fill="url(#pwS_armor)" opacity="0.8"/>
  <ellipse cx="59" cy="100" rx="7" ry="2" fill="url(#pwS_armor)" opacity="0.8"/>

  <!-- BODY ARMOR (hauberk) -->
  <path d="M30,88 Q28,76 30,66 Q33,55 40,50 Q44,47 50,46 Q56,47 60,50 Q67,55 70,66 Q72,76 70,88 Z"
        fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <path d="M30,88 Q28,76 30,66 Q33,55 40,50 Q44,47 50,46 Q56,47 60,50 Q67,55 70,66 Q72,76 70,88 Z"
        fill="url(#pwS_shadow)"/>
  <!-- Armor plate lines chainmail look -->
  <path d="M32,80 Q50,76 68,80" stroke="#90A4AE" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M31,72 Q50,68 69,72" stroke="#90A4AE" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M33,64 Q50,60 67,64" stroke="#90A4AE" stroke-width="0.6" fill="none" opacity="0.4"/>
  <line x1="50" y1="47" x2="50" y2="88" stroke="#78909C" stroke-width="0.5" opacity="0.4"/>
  <!-- Gold belt -->
  <path d="M34,72 Q50,68 66,72 L65,77 Q50,73 35,77 Z" fill="url(#pwS_gold)"/>

  <!-- ROUND SHIELD (left arm) -->
  <circle cx="20" cy="70" r="15" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <circle cx="20" cy="70" r="15" fill="url(#pwS_shadow)"/>
  <!-- Shield face details rings -->
  <circle cx="20" cy="70" r="13" fill="none" stroke="#90A4AE" stroke-width="0.7" opacity="0.6"/>
  <circle cx="20" cy="70" r="9"  fill="none" stroke="#90A4AE" stroke-width="0.6" opacity="0.5"/>
  <circle cx="20" cy="70" r="5"  fill="url(#pwS_armor)" opacity="0.7"/>
  <!-- Gold cross on shield -->
  <line x1="20" y1="58" x2="20" y2="82" stroke="#FFD54F" stroke-width="1.2" opacity="0.8"/>
  <line x1="8"  y1="70" x2="32" y2="70" stroke="#FFD54F" stroke-width="1.2" opacity="0.8"/>
  <!-- Center shield boss -->
  <circle cx="20" cy="70" r="3" fill="url(#pwS_gold)" filter="url(#pwS_glow)"/>
  <circle cx="20" cy="70" r="1.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- RIGHT ARM (holding spear up) -->
  <rect x="68" y="45" width="8" height="40" rx="3" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="68" y="45" width="8" height="40" rx="3" fill="url(#pwS_shadow)"/>
  <!-- SPEAR shaft -->
  <rect x="72" y="5"  width="2.5" height="44" rx="1" fill="url(#pwS_armor)" opacity="0.9"/>
  <!-- Spear tip (bladed) -->
  <polygon points="73.25,4 70,14 76.5,14" fill="url(#pwS_gold)" filter="url(#pwS_glow)"/>
  <line x1="73.25" y1="4"  x2="70"   y2="14" stroke="#FFD54F" stroke-width="0.6"/>
  <line x1="73.25" y1="4"  x2="76.5" y2="14" stroke="#FFF9C4" stroke-width="0.5"/>

  <!-- NECK / PAULDRONS -->
  <rect x="38" y="44" width="24" height="7" rx="2" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <rect x="38" y="44" width="24" height="7" rx="2" fill="url(#pwS_shadow)"/>
  <!-- Pauldron shoulder flaps -->
  <path d="M30,50 Q32,44 40,44 Q38,50 34,52 Z" fill="url(#pwS_armor)" opacity="0.8"/>
  <path d="M70,50 Q68,44 60,44 Q62,50 66,52 Z" fill="url(#pwS_armor)" opacity="0.8"/>

  <!-- HEAD / FACE (young soldier) -->
  <ellipse cx="50" cy="32" rx="12" ry="13" fill="url(#pwS_face)" filter="url(#pwS_depth)"/>
  <ellipse cx="50" cy="32" rx="12" ry="13" fill="url(#pwS_shadow)"/>
  <!-- Youthful face -->
  <ellipse cx="50" cy="33" rx="8.5" ry="10" fill="#F0EAE0" opacity="0.5"/>
  <!-- Eyes (determined young soldier) -->
  <ellipse cx="45" cy="30" rx="2.3" ry="1.8" fill="#5D4037"/>
  <ellipse cx="55" cy="30" rx="2.3" ry="1.8" fill="#5D4037"/>
  <circle cx="45" cy="30" r="1.2" fill="#1A1118"/>
  <circle cx="55" cy="30" r="1.2" fill="#1A1118"/>
  <circle cx="44.5" cy="29.5" r="0.6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="54.5" cy="29.5" r="0.6" fill="#FFFFFF" opacity="0.8"/>
  <!-- Brow (furrowed, brave) -->
  <path d="M42,27 Q45,25.5 48,27" stroke="#9E8070" stroke-width="1" fill="none"/>
  <path d="M52,27 Q55,25.5 58,27" stroke="#9E8070" stroke-width="1" fill="none"/>
  <!-- Nose -->
  <path d="M49,33 Q50,35 51,33" stroke="#A09080" stroke-width="0.7" fill="none"/>
  <!-- Mouth (firm set jaw) -->
  <path d="M46,38 Q50,39.5 54,38" stroke="#A09080" stroke-width="0.8" fill="none"/>

  <!-- HELM (open-face bucket helm) -->
  <!-- Back of helm -->
  <path d="M38,22 Q38,16 50,13 Q62,16 62,22 L60,27 Q50,22 40,27 Z" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <path d="M38,22 Q38,16 50,13 Q62,16 62,22 L60,27 Q50,22 40,27 Z" fill="url(#pwS_shadow)"/>
  <!-- Top of helm -->
  <ellipse cx="50" cy="16" rx="12" ry="6" fill="url(#pwS_armor)" filter="url(#pwS_depth)"/>
  <ellipse cx="50" cy="16" rx="12" ry="6" fill="url(#pwS_shadow)"/>
  <!-- Helm cheek guards -->
  <path d="M38,22 Q36,26 38,32 Q40,34 42,32 Q40,26 40,22 Z" fill="url(#pwS_armor)" opacity="0.8"/>
  <path d="M62,22 Q64,26 62,32 Q60,34 58,32 Q60,26 60,22 Z" fill="url(#pwS_armor)" opacity="0.8"/>
  <!-- Helm nose guard bar -->
  <rect x="48.5" y="20" width="3" height="14" rx="1.5" fill="url(#pwS_armor)" opacity="0.9"/>
  <!-- Gold trim on helm edge -->
  <path d="M38,22 Q50,18 62,22" stroke="#FFD54F" stroke-width="0.8" fill="none" opacity="0.8"/>
  <!-- Helm ridge line -->
  <line x1="50" y1="11" x2="50" y2="22" stroke="#90A4AE" stroke-width="0.8" opacity="0.5"/>
  <!-- Plume (small) -->
  <path d="M50,11 Q48,7 46,8 Q45,10 48,12" fill="#ECEFF1" opacity="0.7"/>
  <path d="M50,11 Q52,7 54,8 Q55,10 52,12" fill="#CFD8DC" opacity="0.6"/>
</svg>
