<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="qb_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4A0A0A"/>
      <stop offset="40%" stop-color="#2D0505"/>
      <stop offset="80%" stop-color="#1A0202"/>
      <stop offset="100%" stop-color="#0D0101"/>
    </radialGradient>
    <linearGradient id="qb_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#CC2222" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CC2222" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="qb_orb" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="40%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#6B0000"/>
    </radialGradient>
    <filter id="qb_glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="95" rx="22" ry="4" fill="#CC0000" opacity="0.25"/>

  <!-- Base -->
  <ellipse cx="50" cy="88" rx="22" ry="5.5" fill="url(#qb_body)"/>
  <ellipse cx="50" cy="86" rx="22" ry="5.5" fill="url(#qb_body)"/>
  <rect x="28" y="82" width="44" height="4" rx="1" fill="url(#qb_body)"/>
  <ellipse cx="50" cy="82" rx="22" ry="4" fill="#3D0808"/>
  <ellipse cx="50" cy="82" rx="20" ry="3.2" fill="url(#qb_body)"/>

  <!-- Skirt -->
  <path d="M30 82 Q27 70 31 62 Q36 54 50 52 Q64 54 69 62 Q73 70 70 82 Z" fill="url(#qb_body)"/>
  <path d="M30 82 Q27 70 31 62 Q36 54 50 52 Q64 54 69 62 Q73 70 70 82 Z" fill="url(#qb_shine)" opacity="0.5"/>

  <!-- Band ring -->
  <ellipse cx="50" cy="63" rx="16" ry="2.5" fill="#8B0000" opacity="0.9"/>
  <ellipse cx="50" cy="63" rx="14" ry="1.8" fill="#CC0000" opacity="0.5"/>

  <!-- Torso -->
  <path d="M35 63 Q33 55 35 49 Q39 43 50 42 Q61 43 65 49 Q67 55 65 63 Z" fill="url(#qb_body)"/>
  <path d="M35 63 Q33 55 35 49 Q39 43 50 42 Q61 43 65 49 Q67 55 65 63 Z" fill="url(#qb_shine)" opacity="0.4"/>

  <!-- Neck -->
  <ellipse cx="50" cy="42" rx="10" ry="2.5" fill="#8B0000"/>
  <ellipse cx="50" cy="41.5" rx="8.5" ry="2" fill="#CC0000" opacity="0.6"/>

  <!-- Head sphere -->
  <circle cx="50" cy="35" r="10" fill="url(#qb_body)"/>
  <circle cx="50" cy="35" r="10" fill="url(#qb_shine)" opacity="0.5"/>

  <!-- Crown base band -->
  <rect x="40" y="27" width="20" height="4" rx="2" fill="#7A0000"/>

  <!-- Orb tips with red glow -->
  <circle cx="40" cy="25" r="3" fill="url(#qb_orb)" filter="url(#qb_glow)"/>
  <circle cx="46" cy="22.5" r="2.5" fill="url(#qb_orb)" filter="url(#qb_glow)"/>
  <circle cx="50" cy="21" r="3" fill="url(#qb_orb)" filter="url(#qb_glow)"/>
  <circle cx="54" cy="22.5" r="2.5" fill="url(#qb_orb)" filter="url(#qb_glow)"/>
  <circle cx="60" cy="25" r="3" fill="url(#qb_orb)" filter="url(#qb_glow)"/>

  <!-- Center gem highlight -->
  <circle cx="50" cy="21" r="1.5" fill="#FF8888" opacity="0.9"/>

  <!-- Body glow highlight -->
  <ellipse cx="44" cy="57" rx="3" ry="5" fill="#FF4444" opacity="0.15" transform="rotate(-15,44,57)"/>
</svg>
