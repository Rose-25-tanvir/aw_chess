<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="bbS_body" cx="38%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#546E7A"/>
      <stop offset="30%" stop-color="#37474F"/>
      <stop offset="70%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#090E10"/>
    </radialGradient>
    <radialGradient id="bbS_face" cx="38%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#455A64"/>
      <stop offset="50%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#0D1B20"/>
    </radialGradient>
    <radialGradient id="bbS_silver" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <radialGradient id="bbS_magic" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </radialGradient>
    <linearGradient id="bbS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bbS_robe" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#37474F"/>
      <stop offset="40%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#050D10"/>
    </linearGradient>
    <filter id="bbS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/></filter>
    <filter id="bbS_glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#9C27B0" flood-opacity="0.7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bbS_eyeglow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feFlood flood-color="#FF1744" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="24" ry="5" fill="#000000" opacity="0.45"/>

  <!-- BASE -->
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#bbS_body)" filter="url(#bbS_depth)"/>
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#bbS_shadow)"/>
  <rect x="26" y="99" width="48" height="10" rx="2" fill="url(#bbS_body)" filter="url(#bbS_depth)"/>

  <!-- DARK ROBE -->
  <path d="M28,99 Q24,83 27,68 Q30,54 36,47 Q40,42 50,40 Q60,42 64,47 Q70,54 73,68 Q76,83 72,99 Z"
        fill="url(#bbS_robe)" filter="url(#bbS_depth)"/>
  <path d="M28,99 Q24,83 27,68 Q30,54 36,47 Q40,42 50,40 Q60,42 64,47 Q70,54 73,68 Q76,83 72,99 Z"
        fill="url(#bbS_shadow)"/>
  <!-- Dark robe folds -->
  <path d="M50,41 L47,70 L46,99" stroke="#263238" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M50,41 L53,70 L54,99" stroke="#263238" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M28,99 Q30,83 33,68 Q36,56 40,49" stroke="#37474F" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M72,99 Q70,83 67,68 Q64,56 60,49" stroke="#1C2A30" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Mystical rune patterns on robe -->
  <path d="M34,75 Q37,71 34,67 Q37,63 34,59" stroke="#7B1FA2" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M66,75 Q63,71 66,67 Q63,63 66,59" stroke="#7B1FA2" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M40,88 L44,83 L40,78" stroke="#9C27B0" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M60,88 L56,83 L60,78" stroke="#9C27B0" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Hem with magic glow -->
  <path d="M28,99 Q36,95 50,94 Q64,95 72,99" stroke="#7B1FA2" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- DARK CHEST INVERTED SIGIL -->
  <path d="M36,47 Q38,41 50,39 Q62,41 64,47 Q62,56 50,58 Q38,56 36,47 Z"
        fill="url(#bbS_body)" filter="url(#bbS_depth)"/>
  <path d="M36,47 Q38,41 50,39 Q62,41 64,47 Q62,56 50,58 Q38,56 36,47 Z" fill="url(#bbS_shadow)"/>
  <!-- Dark inverted pentagram/sigil -->
  <circle cx="50" cy="48" r="8" fill="none" stroke="#7B1FA2" stroke-width="0.7" opacity="0.7"/>
  <!-- Inner star -->
  <polygon points="50,40.5 52,45.5 57.5,45.5 53.5,49 55,54 50,51 45,54 46.5,49 42.5,45.5 48,45.5" fill="none" stroke="#9C27B0" stroke-width="0.6" opacity="0.6"/>
  <!-- Core gem -->
  <circle cx="50" cy="48" r="3" fill="url(#bbS_magic)" filter="url(#bbS_glow)"/>
  <circle cx="50" cy="48" r="1.5" fill="#CE93D8" opacity="0.9"/>

  <!-- LEFT ARM -->
  <path d="M36,56 Q28,52 25,46 Q23,40 27,37 Q32,34 36,38 Q38,43 38,52 Z"
        fill="url(#bbS_robe)" filter="url(#bbS_depth)"/>
  <!-- Dark grimoire (spell book) -->
  <rect x="15" y="37" width="13" height="10" rx="1" fill="#1C2A30" stroke="#37474F" stroke-width="0.6"/>
  <line x1="21.5" y1="37" x2="21.5" y2="47" stroke="#37474F" stroke-width="1.5"/>
  <!-- Rune writing on book -->
  <line x1="17" y1="40" x2="21" y2="40" stroke="#7B1FA2" stroke-width="0.5"/>
  <line x1="17" y1="42" x2="21" y2="42" stroke="#7B1FA2" stroke-width="0.5"/>
  <line x1="17" y1="44" x2="21" y2="44" stroke="#7B1FA2" stroke-width="0.5"/>
  <!-- Glowing eye on book cover -->
  <ellipse cx="25" cy="42" rx="2.5" ry="2" fill="#FF1744" filter="url(#bbS_eyeglow)" opacity="0.9"/>

  <!-- RIGHT ARM with dark staff -->
  <path d="M64,56 Q72,52 75,46 Q77,40 73,37 Q68,34 64,38 Q62,43 62,52 Z"
        fill="url(#bbS_robe)" filter="url(#bbS_depth)"/>
  <!-- Dark twisted staff -->
  <path d="M80,80 Q82,60 81,40" stroke="#37474F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Staff crystal top -->
  <polygon points="81,38 78,29 85,27 84,36" fill="url(#bbS_magic)" filter="url(#bbS_glow)"/>
  <circle cx="82" cy="29" r="3" fill="#9C27B0" filter="url(#bbS_glow)"/>
  <circle cx="82" cy="29" r="1.5" fill="#CE93D8" opacity="0.9"/>
  <!-- Staff wrap detail -->
  <path d="M80,60 Q83,58 80,56 Q83,54 80,52" stroke="#7B1FA2" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- NO collar for dark bishop - dark cowl instead -->
  <path d="M40,40 Q50,36 60,40 Q58,44 50,45 Q42,44 40,40 Z" fill="#1C2A30" opacity="0.8"/>

  <!-- NECK -->
  <rect x="45" y="34" width="10" height="8" rx="3" fill="url(#bbS_face)" filter="url(#bbS_depth)"/>

  <!-- HEAD - shadows and dark energy -->
  <ellipse cx="50" cy="25" rx="12" ry="13" fill="url(#bbS_face)" filter="url(#bbS_depth)"/>
  <ellipse cx="50" cy="25" rx="12" ry="13" fill="url(#bbS_shadow)"/>
  <ellipse cx="50" cy="26" rx="8" ry="9" fill="#263238" opacity="0.4"/>
  <!-- GLOWING red eyes -->
  <ellipse cx="45" cy="23" rx="2.5" ry="2" fill="#FF1744" filter="url(#bbS_eyeglow)"/>
  <ellipse cx="55" cy="23" rx="2.5" ry="2" fill="#FF1744" filter="url(#bbS_eyeglow)"/>
  <circle cx="45" cy="23" r="1.2" fill="#FF8F00"/>
  <circle cx="55" cy="23" r="1.2" fill="#FF8F00"/>
  <circle cx="44.5" cy="22.5" r="0.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="54.5" cy="22.5" r="0.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- Angular nose -->
  <path d="M48.5,27 Q50,30 51.5,27" stroke="#37474F" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Thin sneering mouth -->
  <path d="M45,32 Q50,30 55,32" stroke="#455A64" stroke-width="0.8" fill="none"/>
  <!-- Sunken cheeks -->
  <path d="M38,24 Q40,26 42,24" stroke="#263238" fill="none" stroke-width="0.6"/>
  <path d="M62,24 Q60,26 58,24" stroke="#263238" fill="none" stroke-width="0.6"/>

  <!-- DARK WARLOCK HOOD / MITRE (jagged, twisted) -->
  <!-- Hood shadow behind -->
  <path d="M36,16 Q34,22 36,30 Q38,34 41,36" fill="#090E10" opacity="0.6"/>
  <path d="M64,16 Q66,22 64,30 Q62,34 59,36" fill="#050B0E" opacity="0.5"/>
  <!-- Dark pointed hat (sinister) -->
  <path d="M36,14 Q38,10 50,2 Q62,10 64,14 L58,16 L50,12 L42,16 Z" fill="url(#bbS_body)" filter="url(#bbS_depth)"/>
  <path d="M36,14 Q38,10 50,2 Q62,10 64,14 L58,16 L50,12 L42,16 Z" fill="url(#bbS_shadow)"/>
  <!-- Hat point -->
  <path d="M42,16 Q46,10 50,2 Q54,10 58,16" fill="url(#bbS_body)" filter="url(#bbS_depth)"/>
  <path d="M42,16 Q46,10 50,2 Q54,10 58,16" fill="url(#bbS_shadow)"/>
  <!-- Hat seams dark lines -->
  <line x1="50" y1="2" x2="50" y2="16" stroke="#263238" stroke-width="0.7" opacity="0.7"/>
  <line x1="50" y1="2" x2="42" y2="16" stroke="#1C2A30" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="2" x2="58" y2="16" stroke="#1C2A30" stroke-width="0.5" opacity="0.5"/>
  <!-- Silver/dark trim -->
  <rect x="36" y="13" width="28" height="3" rx="1" fill="url(#bbS_body)" stroke="#546E7A" stroke-width="0.6"/>
  <!-- Glowing sigil on hat -->
  <circle cx="50" cy="7" r="2.5" fill="url(#bbS_magic)" filter="url(#bbS_glow)"/>
  <circle cx="50" cy="7" r="1.2" fill="#CE93D8" opacity="0.9"/>
  <!-- band gems -->
  <circle cx="41" cy="14.5" r="1.2" fill="#9C27B0" opacity="0.9"/>
  <circle cx="50" cy="14.5" r="1.5" fill="#FF1744" opacity="0.9"/>
  <circle cx="59" cy="14.5" r="1.2" fill="#9C27B0" opacity="0.9"/>
  <!-- Lappets (dark strips) -->
  <rect x="36" y="16" width="4" height="12" rx="1" fill="url(#bbS_body)" opacity="0.7"/>
  <rect x="60" y="16" width="4" height="12" rx="1" fill="url(#bbS_body)" opacity="0.7"/>
</svg>
