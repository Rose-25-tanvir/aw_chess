<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="pbS_armor" cx="35%" cy="28%" r="72%">
      <stop offset="0%"  stop-color="#546E7A"/>
      <stop offset="30%" stop-color="#37474F"/>
      <stop offset="65%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#060C0F"/>
    </radialGradient>
    <radialGradient id="pbS_silver" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <radialGradient id="pbS_skull" cx="38%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#455A64"/>
      <stop offset="50%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#0D1B20"/>
    </radialGradient>
    <linearGradient id="pbS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="pbS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.7"/></filter>
    <filter id="pbS_fireglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#FF6D00" flood-opacity="0.7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pbS_redglow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feFlood flood-color="#FF1744" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="24" ry="5" fill="#000000" opacity="0.45"/>

  <!-- BASE -->
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <rect x="20" y="108" width="60" height="9" rx="3" fill="url(#pbS_shadow)"/>
  <rect x="26" y="100" width="48" height="9" rx="2" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>

  <!-- SKELETON LEGS (bone-like) -->
  <rect x="35" y="88" width="12" height="13" rx="3" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <rect x="35" y="88" width="12" height="13" rx="3" fill="url(#pbS_shadow)"/>
  <rect x="53" y="88" width="12" height="13" rx="3" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <rect x="53" y="88" width="12" height="13" rx="3" fill="url(#pbS_shadow)"/>
  <!-- Bone/joint detail -->
  <ellipse cx="41" cy="88" rx="7" ry="2" fill="url(#pbS_silver)" opacity="0.5"/>
  <ellipse cx="59" cy="88" rx="7" ry="2" fill="url(#pbS_silver)" opacity="0.5"/>
  <!-- Boot toe spikes -->
  <polygon points="35,100 33,104 37,102" fill="url(#pbS_silver)" opacity="0.7"/>
  <polygon points="65,100 63,104 67,102" fill="url(#pbS_silver)" opacity="0.7"/>

  <!-- DARK BODY ARMOR (ribs/plate) -->
  <path d="M31,88 Q29,76 31,66 Q34,55 41,50 Q45,47 50,46 Q55,47 59,50 Q66,55 69,66 Q71,76 69,88 Z"
        fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <path d="M31,88 Q29,76 31,66 Q34,55 41,50 Q45,47 50,46 Q55,47 59,50 Q66,55 69,66 Q71,76 69,88 Z"
        fill="url(#pbS_shadow)"/>
  <!-- Ribcage/armor plate horizontal lines -->
  <path d="M33,80 Q50,76 67,80" stroke="#37474F" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M32,72 Q50,68 68,72" stroke="#37474F" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M34,64 Q50,60 66,64" stroke="#263238" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Rib spike detail -->
  <polygon points="36,72 34,66 38,67" fill="url(#pbS_silver)" opacity="0.5"/>
  <polygon points="64,72 66,66 62,67" fill="url(#pbS_silver)" opacity="0.4"/>
  <!-- Dark silver belt with skull -->
  <path d="M34,72 Q50,68 66,72 L65,77 Q50,73 35,77 Z" fill="url(#pbS_silver)" opacity="0.6"/>
  <!-- Skull on belt -->
  <circle cx="50" cy="74.5" r="3" fill="#1C2A30"/>
  <circle cx="48.5" cy="73.5" r="1.1" fill="#FF1744" filter="url(#pbS_redglow)"/>
  <circle cx="51.5" cy="73.5" r="1.1" fill="#FF1744" filter="url(#pbS_redglow)"/>
  <path d="M48,76 Q50,78 52,76" stroke="#37474F" stroke-width="0.6" fill="none"/>

  <!-- DARK SPIKY SHIELD (left arm) -->
  <circle cx="20" cy="70" r="15" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <circle cx="20" cy="70" r="15" fill="url(#pbS_shadow)"/>
  <!-- Shield rings -->
  <circle cx="20" cy="70" r="13" fill="none" stroke="#37474F" stroke-width="0.8" opacity="0.7"/>
  <circle cx="20" cy="70" r="9"  fill="none" stroke="#37474F" stroke-width="0.6" opacity="0.6"/>
  <!-- Skull face on shield -->
  <circle cx="20" cy="69" r="6" fill="#1C2A30"/>
  <circle cx="18" cy="67.5" r="2"   fill="#FF1744" filter="url(#pbS_redglow)"/>
  <circle cx="22" cy="67.5" r="2"   fill="#FF1744" filter="url(#pbS_redglow)"/>
  <path d="M17,72 Q20,75 23,72" stroke="#37474F" stroke-width="0.8" fill="none"/>
  <!-- Shield spikes (3 outer) -->
  <polygon points="20,55 18,60 22,60" fill="url(#pbS_silver)" opacity="0.7"/>
  <polygon points="7,70 12,67 12,73"  fill="url(#pbS_silver)" opacity="0.7"/>
  <polygon points="33,70 28,67 28,73" fill="url(#pbS_silver)" opacity="0.7"/>
  <polygon points="20,85 18,80 22,80" fill="url(#pbS_silver)" opacity="0.5"/>

  <!-- RIGHT ARM (dark axe weapon) -->
  <rect x="69" y="48" width="8" height="36" rx="3" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <!-- BATTLE AXE shaft -->
  <rect x="73" y="12" width="2.5" height="38" rx="1" fill="url(#pbS_armor)" opacity="0.9"/>
  <!-- Axe head -->
  <path d="M74.25,14 Q66,10 65,18 Q66,26 74.25,22 Z" fill="url(#pbS_silver)" filter="url(#pbS_depth)"/>
  <path d="M74.25,14 Q82,10 83,18 Q82,26 74.25,22 Z" fill="url(#pbS_silver)" filter="url(#pbS_depth)"/>
  <line x1="74.25" y1="14" x2="74.25" y2="22" stroke="#90A4AE" stroke-width="0.8"/>
  <!-- Axe notch details -->
  <path d="M68,16 Q65,18 66,22" stroke="#78909C" stroke-width="0.5" fill="none" opacity="0.6"/>
  <path d="M80,16 Q83,18 82,22" stroke="#78909C" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- Blood mark on axe -->
  <path d="M68,20 Q70,18 71,20" stroke="#FF1744" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- DARK PAULDRONS -->
  <path d="M31,52 Q30,46 38,44 Q36,52 32,55 Z" fill="url(#pbS_armor)" opacity="0.9"/>
  <path d="M69,52 Q70,46 62,44 Q64,52 68,55 Z" fill="url(#pbS_armor)" opacity="0.9"/>
  <!-- Shoulder spikes -->
  <polygon points="30,50 27,44 33,46" fill="url(#pbS_silver)" opacity="0.7"/>
  <polygon points="70,50 73,44 67,46" fill="url(#pbS_silver)" opacity="0.7"/>

  <!-- SKELETON SKULL HEAD -->
  <ellipse cx="50" cy="32" rx="13" ry="14" fill="url(#pbS_skull)" filter="url(#pbS_depth)"/>
  <ellipse cx="50" cy="32" rx="13" ry="14" fill="url(#pbS_shadow)"/>
  <!-- Skull dome -->
  <ellipse cx="50" cy="28" rx="11" ry="9" fill="#263238" opacity="0.6"/>
  <!-- HOLLOW EYES (large glowing sockets) -->
  <ellipse cx="44" cy="28" rx="4.5" ry="4" fill="#0D1B20"/>
  <ellipse cx="56" cy="28" rx="4.5" ry="4" fill="#0D1B20"/>
  <!-- Eye fire glow -->
  <ellipse cx="44" cy="28" rx="3"   ry="2.7" fill="#FF6D00" filter="url(#pbS_fireglow)"/>
  <ellipse cx="56" cy="28" rx="3"   ry="2.7" fill="#FF6D00" filter="url(#pbS_fireglow)"/>
  <ellipse cx="44" cy="28" rx="1.8" ry="1.5" fill="#FFAB40"/>
  <ellipse cx="56" cy="28" rx="1.8" ry="1.5" fill="#FFAB40"/>
  <!-- Nose hole (triangular) -->
  <polygon points="50,34 48,38 52,38" fill="#0D1B20" opacity="0.8"/>
  <!-- TEETH / Jaw -->
  <rect x="40" y="39" width="20" height="5" rx="1" fill="#1C2A30" opacity="0.9"/>
  <!-- Individual teeth -->
  <rect x="41" y="39" width="3" height="4" rx="0.5" fill="#455A64"/>
  <rect x="45" y="39" width="3" height="4" rx="0.5" fill="#455A64"/>
  <rect x="49" y="39" width="3" height="4" rx="0.5" fill="#455A64"/>
  <rect x="53" y="39" width="3" height="4" rx="0.5" fill="#455A64"/>
  <rect x="57" y="39" width="3" height="4" rx="0.5" fill="#455A64"/>
  <!-- Teeth light edge -->
  <rect x="41.5" y="39" width="2" height="3.5" rx="0.3" fill="#546E7A" opacity="0.5"/>
  <rect x="45.5" y="39" width="2" height="3.5" rx="0.3" fill="#546E7A" opacity="0.5"/>
  <rect x="49.5" y="39" width="2" height="3.5" rx="0.3" fill="#546E7A" opacity="0.5"/>
  <rect x="53.5" y="39" width="2" height="3.5" rx="0.3" fill="#546E7A" opacity="0.5"/>
  <rect x="57.5" y="39" width="2" height="3.5" rx="0.3" fill="#546E7A" opacity="0.5"/>
  <!-- Skull cracks -->
  <path d="M46,20 L48,26 L45,30" stroke="#0D1B20" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M56,21 L55,27" stroke="#0D1B20" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- DARK HORNED HELM on skull -->
  <path d="M38,22 Q38,14 50,11 Q62,14 62,22 L60,26 Q50,21 40,26 Z" fill="url(#pbS_armor)" filter="url(#pbS_depth)"/>
  <path d="M38,22 Q38,14 50,11 Q62,14 62,22 L60,26 Q50,21 40,26 Z" fill="url(#pbS_shadow)"/>
  <!-- Small horns on helm -->
  <path d="M40,16 Q36,10 38,7 Q40,9 40,14 Z" fill="url(#pbS_armor)" stroke="#37474F" stroke-width="0.5"/>
  <path d="M60,16 Q64,10 62,7 Q60,9 60,14 Z" fill="url(#pbS_armor)" stroke="#37474F" stroke-width="0.5"/>
  <circle cx="38" cy="7" r="1.5" fill="#FF1744" filter="url(#pbS_redglow)" opacity="0.8"/>
  <circle cx="62" cy="7" r="1.5" fill="#FF1744" filter="url(#pbS_redglow)" opacity="0.8"/>
  <!-- Helm silver line edge -->
  <path d="M40,26 Q50,21 60,26" stroke="#546E7A" stroke-width="0.8" fill="none" opacity="0.7"/>
  <line x1="50" y1="11" x2="50" y2="22" stroke="#263238" stroke-width="0.7" opacity="0.6"/>
</svg>
