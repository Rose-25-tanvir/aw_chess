<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="nbS_horse" cx="38%" cy="28%" r="72%">
      <stop offset="0%"  stop-color="#546E7A"/>
      <stop offset="30%" stop-color="#37474F"/>
      <stop offset="65%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#060C0F"/>
    </radialGradient>
    <radialGradient id="nbS_armor" cx="35%" cy="25%" r="70%">
      <stop offset="0%"  stop-color="#455A64"/>
      <stop offset="40%" stop-color="#263238"/>
      <stop offset="80%" stop-color="#1C2A30"/>
      <stop offset="100%" stop-color="#060C0F"/>
    </radialGradient>
    <radialGradient id="nbS_silver" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <radialGradient id="nbS_eye" cx="30%" cy="25%" r="60%">
      <stop offset="0%"  stop-color="#FF8F00"/>
      <stop offset="40%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#4A0000"/>
    </radialGradient>
    <linearGradient id="nbS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="nbS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.7"/></filter>
    <filter id="nbS_fireglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#FF6D00" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nbS_eyeglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#FF1744" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="26" ry="5" fill="#000000" opacity="0.5"/>

  <!-- BASE -->
  <rect x="14" y="108" width="72" height="9" rx="3" fill="url(#nbS_armor)" filter="url(#nbS_depth)"/>
  <rect x="14" y="108" width="72" height="9" rx="3" fill="url(#nbS_shadow)"/>
  <rect x="20" y="100" width="60" height="9" rx="2" fill="url(#nbS_armor)" filter="url(#nbS_depth)"/>

  <!-- DARK HORSE BODY -->
  <path d="M20,100 Q16,88 20,74 Q24,60 32,52 Q38,46 46,42 Q52,40 58,42 Q68,46 74,54 Q80,64 80,76 Q80,90 76,100 Z"
        fill="url(#nbS_horse)" filter="url(#nbS_depth)"/>
  <path d="M20,100 Q16,88 20,74 Q24,60 32,52 Q38,46 46,42 Q52,40 58,42 Q68,46 74,54 Q80,64 80,76 Q80,90 76,100 Z"
        fill="url(#nbS_shadow)"/>
  <!-- Dark armor plates -->
  <path d="M30,80 Q32,68 40,58 Q46,50 56,46 Q66,48 72,58 Q76,68 74,80 Q60,76 50,76 Q38,76 30,80 Z"
        fill="url(#nbS_armor)" opacity="0.6"/>
  <path d="M34,75 Q36,65 42,57 Q48,51 56,48" stroke="#37474F" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M68,75 Q70,65 70,57 Q68,51 62,48" stroke="#263238" stroke-width="0.7" fill="none" opacity="0.5"/>
  <!-- Spiked armor plates -->
  <polygon points="36,84 38,77 40,84" fill="url(#nbS_silver)" opacity="0.6"/>
  <polygon points="46,82 48,75 50,82" fill="url(#nbS_silver)" opacity="0.6"/>
  <polygon points="56,82 58,75 60,82" fill="url(#nbS_silver)" opacity="0.6"/>
  <polygon points="64,84 66,77 68,84" fill="url(#nbS_silver)" opacity="0.5"/>
  <!-- Body dark seams -->
  <path d="M28,94 Q50,90 74,94" stroke="#263238" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- DARK BARDING (spiked war armor) -->
  <path d="M28,76 Q50,71 74,76 L72,83 Q50,78 30,83 Z" fill="url(#nbS_armor)"/>
  <!-- Skull on barding -->
  <circle cx="50" cy="79" r="3.5" fill="#1C2A30"/>
  <circle cx="48.2" cy="78" r="1.2" fill="#FF1744" filter="url(#nbS_eyeglow)"/>
  <circle cx="51.8" cy="78" r="1.2" fill="#FF1744" filter="url(#nbS_eyeglow)"/>
  <path d="M47.5,81 Q50,83 52.5,81" stroke="#37474F" stroke-width="0.7" fill="none"/>

  <!-- DARK NECK -->
  <path d="M46,42 Q40,35 42,22 Q44,12 50,8 Q56,12 58,22 Q60,35 54,42 Z"
        fill="url(#nbS_horse)" filter="url(#nbS_depth)"/>
  <path d="M46,42 Q40,35 42,22 Q44,12 50,8 Q56,12 58,22 Q60,35 54,42 Z" fill="url(#nbS_shadow)"/>
  <!-- Neck spiked armor -->
  <path d="M46,42 Q42,34 43,24" stroke="#37474F" stroke-width="0.8" fill="none" opacity="0.6"/>
  <polygon points="44,38 42,32 46,34" fill="url(#nbS_silver)" opacity="0.5"/>
  <polygon points="44,30 42,25 46,27" fill="url(#nbS_silver)" opacity="0.5"/>
  <!-- Silver collar spikes -->
  <path d="M44,43 Q50,40 56,43 Q55,47 50,48 Q45,47 44,43 Z" fill="url(#nbS_armor)"/>
  <polygon points="46,43 47,38 48,43" fill="url(#nbS_silver)" opacity="0.7"/>
  <polygon points="49.5,43 50.5,37 51.5,43" fill="url(#nbS_silver)" opacity="0.7"/>
  <polygon points="53,43 54,38 55,43" fill="url(#nbS_silver)" opacity="0.7"/>

  <!-- NIGHTMARE HORSE HEAD -->
  <path d="M42,22 Q38,16 40,9 Q43,3 50,2 Q57,3 60,9 Q62,16 58,22 Q55,28 50,30 Q45,28 42,22 Z"
        fill="url(#nbS_horse)" filter="url(#nbS_depth)"/>
  <path d="M42,22 Q38,16 40,9 Q43,3 50,2 Q57,3 60,9 Q62,16 58,22 Q55,28 50,30 Q45,28 42,22 Z"
        fill="url(#nbS_shadow)"/>

  <!-- DARK MUZZLE -->
  <path d="M44,24 Q40,24 38,27 Q37,31 40,33 Q44,35 50,35 Q56,35 60,33 Q63,31 62,27 Q60,24 56,24 Z"
        fill="url(#nbS_horse)" filter="url(#nbS_depth)"/>
  <path d="M44,24 Q40,24 38,27 Q37,31 40,33 Q44,35 50,35 Q56,35 60,33 Q63,31 62,27 Q60,24 56,24 Z"
        fill="url(#nbS_shadow)" opacity="0.7"/>
  <!-- Flaring nostrils with FIRE breath hints -->
  <ellipse cx="43" cy="31" rx="2.5" ry="1.8" fill="#4A0000" opacity="0.8"/>
  <ellipse cx="57" cy="31" rx="2.5" ry="1.8" fill="#4A0000" opacity="0.8"/>
  <!-- Fire breath from nostrils -->
  <path d="M41,30 Q39,28 38,25" stroke="#FF6D00" stroke-width="1" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M40,31 Q37,30 36,27" stroke="#FF8F00" stroke-width="0.7" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Mouth bared teeth -->
  <path d="M42,34 Q50,37 58,34" stroke="#37474F" stroke-width="0.8" fill="none"/>
  <!-- Fangs -->
  <polygon points="44,34 44.5,37 45.5,34" fill="#ECEFF1" opacity="0.6"/>
  <polygon points="54,34 54.5,37 55.5,34" fill="#ECEFF1" opacity="0.6"/>

  <!-- GLOWING DEMON EYES -->
  <ellipse cx="44" cy="19" rx="3.5" ry="3" fill="#4A0000"/>
  <ellipse cx="56" cy="19" rx="3.5" ry="3" fill="#4A0000"/>
  <ellipse cx="44" cy="19" rx="3.5" ry="3" fill="url(#nbS_eye)" filter="url(#nbS_eyeglow)"/>
  <ellipse cx="56" cy="19" rx="3.5" ry="3" fill="url(#nbS_eye)" filter="url(#nbS_eyeglow)"/>
  <ellipse cx="44" cy="19" rx="1.8" ry="1.5" fill="#FF1744"/>
  <ellipse cx="56" cy="19" rx="1.8" ry="1.5" fill="#FF1744"/>
  <circle cx="43.5" cy="18.5" r="0.6" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="55.5" cy="18.5" r="0.6" fill="#FFFFFF" opacity="0.7"/>

  <!-- DARK MANE (wild, jagged black flames) -->
  <path d="M58,22 Q66,16 68,8 Q66,4 63,6 Q61,10 58,18" fill="#1C2A30"/>
  <path d="M59,18 Q67,14 68,6" stroke="#263238" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Fire in mane -->
  <path d="M60,15 Q66,12 66,6" stroke="#FF6D00" stroke-width="0.8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M62,12 Q66,10 65,5" stroke="#FF8F00" stroke-width="0.6" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M57,10 Q64,9 63,4" stroke="#FF6D00" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- DARK WAR HELMET -->
  <rect x="40" y="8" width="20" height="5" rx="1.5" fill="url(#nbS_armor)" opacity="0.9"/>
  <rect x="42" y="8" width="16" height="3" rx="1" fill="#263238" opacity="0.5"/>
  <!-- Nasal bar -->
  <rect x="48.5" y="8" width="3" height="16" rx="1" fill="url(#nbS_armor)" opacity="0.9"/>
  <!-- Silver trim with spikes -->
  <line x1="40" y1="8" x2="60" y2="8" stroke="#90A4AE" stroke-width="0.8" opacity="0.8"/>
  <!-- Helm skull crest -->
  <path d="M44,8 Q50,3 56,8" fill="none" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Dark horns on helm -->
  <path d="M42,8 Q38,4 36,1 Q38,3 40,7 Q41,8 42,8 Z" fill="url(#nbS_armor)" stroke="#37474F" stroke-width="0.5"/>
  <path d="M58,8 Q62,4 64,1 Q62,3 60,7 Q59,8 58,8 Z" fill="url(#nbS_armor)" stroke="#37474F" stroke-width="0.5"/>
  <!-- Horn tips glow -->
  <circle cx="36" cy="1.5" r="1.5" fill="#FF1744" filter="url(#nbS_eyeglow)" opacity="0.7"/>
  <circle cx="64" cy="1.5" r="1.5" fill="#FF1744" filter="url(#nbS_eyeglow)" opacity="0.7"/>
</svg>
