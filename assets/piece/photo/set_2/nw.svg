<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="nw_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFEF0"/>
      <stop offset="40%" stop-color="#F5E6B0"/>
      <stop offset="80%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="nw_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nw_eye" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#0277BD"/>
      <stop offset="100%" stop-color="#01305C"/>
    </radialGradient>
    <filter id="nw_glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="95" rx="20" ry="4" fill="#B8860B" opacity="0.35"/>

  <!-- Base -->
  <ellipse cx="50" cy="88" rx="20" ry="5" fill="url(#nw_body)"/>
  <ellipse cx="50" cy="86" rx="20" ry="5" fill="url(#nw_body)"/>
  <rect x="30" y="83" width="40" height="3" rx="1" fill="url(#nw_body)"/>
  <ellipse cx="50" cy="83" rx="20" ry="3.5" fill="#F5E6B0"/>
  <ellipse cx="50" cy="83" rx="18" ry="2.8" fill="url(#nw_body)"/>

  <!-- Neck column -->
  <path d="M36 83 Q34 72 37 64 Q41 56 50 54 Q59 56 63 64 Q66 72 64 83 Z" fill="url(#nw_body)"/>
  <path d="M36 83 Q34 72 37 64 Q41 56 50 54 Q59 56 63 64 Q66 72 64 83 Z" fill="url(#nw_shine)" opacity="0.4"/>

  <!-- Band ring -->
  <ellipse cx="50" cy="65" rx="14" ry="2.5" fill="#D4A843" opacity="0.8"/>

  <!-- Horse neck rising from column -->
  <!-- Chest/lower neck -->
  <path d="M38 54 Q35 48 36 40 Q38 34 44 30 Q48 27 50 26 Q58 27 62 36 Q65 44 62 54 Z" fill="url(#nw_body)"/>
  <path d="M38 54 Q35 48 36 40 Q38 34 44 30 Q48 27 50 26 Q58 27 62 36 Q65 44 62 54 Z" fill="url(#nw_shine)" opacity="0.35"/>

  <!-- Horse head - angled forward -->
  <path d="M44 30 Q40 22 42 16 Q45 10 52 9 Q60 9 63 15 Q66 21 62 29 Q58 34 50 33 Q46 33 44 30 Z" fill="url(#nw_body)"/>
  <path d="M44 30 Q40 22 42 16 Q45 10 52 9 Q60 9 63 15 Q66 21 62 29 Q58 34 50 33 Q46 33 44 30 Z" fill="url(#nw_shine)" opacity="0.45"/>

  <!-- Mane details on neck -->
  <path d="M60 30 Q63 26 62 20 Q60 14 55 11" stroke="#D4A843" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M58 32 Q62 27 61 21" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Horse nostril -->
  <ellipse cx="44" cy="26" rx="2" ry="1.5" fill="#8B6914" opacity="0.6"/>

  <!-- Horse eye - sapphire blue gem -->
  <circle cx="55" cy="16" r="3.5" fill="url(#nw_eye)" filter="url(#nw_glow)"/>
  <circle cx="55" cy="16" r="1.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Ear -->
  <path d="M57 10 L60 6 L64 10" fill="url(#nw_body)" stroke="#D4A843" stroke-width="1"/>

  <!-- Gold crown detail on forehead -->
  <path d="M48 13 Q52 10 57 11" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- Body highlight -->
  <ellipse cx="41" cy="68" rx="2.5" ry="6" fill="#FFFFFF" opacity="0.2" transform="rotate(-10,41,68)"/>
</svg>
