<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="nwS_horse" cx="38%" cy="28%" r="72%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E0E7EE"/>
      <stop offset="65%" stop-color="#9EB3C0"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </radialGradient>
    <radialGradient id="nwS_armor" cx="35%" cy="25%" r="70%">
      <stop offset="0%"  stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#CFD8DC"/>
      <stop offset="80%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#455A64"/>
    </radialGradient>
    <radialGradient id="nwS_gold" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#FFF9C4"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <radialGradient id="nwS_eye" cx="30%" cy="25%" r="65%">
      <stop offset="0%"  stop-color="#E3F2FD"/>
      <stop offset="40%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <linearGradient id="nwS_shadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#455A64" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#455A64" stop-opacity="0"/>
      <stop offset="100%" stop-color="#263238" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="nwS_depth"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#263238" flood-opacity="0.4"/></filter>
    <filter id="nwS_glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="50" cy="117" rx="26" ry="5" fill="#263238" opacity="0.28"/>

  <!-- BASE -->
  <rect x="14" y="108" width="72" height="9" rx="3" fill="url(#nwS_armor)" filter="url(#nwS_depth)"/>
  <rect x="14" y="108" width="72" height="9" rx="3" fill="url(#nwS_shadow)"/>
  <rect x="20" y="100" width="60" height="9" rx="2" fill="url(#nwS_armor)" filter="url(#nwS_depth)"/>
  <rect x="20" y="100" width="60" height="9" rx="2" fill="url(#nwS_shadow)"/>

  <!-- HORSE BODY / CHEST -->
  <!-- Main body mass -->
  <path d="M20,100 Q16,88 20,74 Q24,60 32,52 Q38,46 46,42 Q52,40 58,42 Q68,46 74,54 Q80,64 80,76 Q80,90 76,100 Z"
        fill="url(#nwS_horse)" filter="url(#nwS_depth)"/>
  <path d="M20,100 Q16,88 20,74 Q24,60 32,52 Q38,46 46,42 Q52,40 58,42 Q68,46 74,54 Q80,64 80,76 Q80,90 76,100 Z"
        fill="url(#nwS_shadow)"/>
  <!-- Armor plates on chest -->
  <path d="M30,80 Q32,68 40,58 Q46,50 56,46 Q66,48 72,58 Q76,68 74,80 Q60,76 50,76 Q38,76 30,80 Z"
        fill="url(#nwS_armor)" opacity="0.6"/>
  <!-- Armor segments lines -->
  <path d="M34,75 Q36,65 42,57 Q48,51 56,48" stroke="#90A4AE" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M68,75 Q70,65 70,57 Q68,51 62,48" stroke="#78909C" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Body armor scallop lines -->
  <path d="M32,88 Q50,84 72,88" stroke="#90A4AE" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M28,94 Q50,90 74,94" stroke="#78909C" stroke-width="0.7" fill="none" opacity="0.4"/>

  <!-- GOLD BARDING / SADDLE ARMOR -->
  <path d="M30,78 Q50,73 72,78 L70,85 Q50,80 32,85 Z" fill="url(#nwS_gold)" opacity="0.9"/>
  <!-- Gold barding details -->
  <path d="M34,81 Q50,77 68,81" stroke="#FFF9C4" stroke-width="0.5" opacity="0.7"/>
  <circle cx="50" cy="81" r="3" fill="url(#nwS_gold)"/>
  <circle cx="50" cy="81" r="1.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- NECK rising powerfully -->
  <path d="M46,42 Q40,35 42,22 Q44,12 50,8 Q56,12 58,22 Q60,35 54,42 Z"
        fill="url(#nwS_horse)" filter="url(#nwS_depth)"/>
  <path d="M46,42 Q40,35 42,22 Q44,12 50,8 Q56,12 58,22 Q60,35 54,42 Z" fill="url(#nwS_shadow)"/>
  <!-- Neck armor plates -->
  <path d="M46,42 Q42,34 43,24" stroke="#90A4AE" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M54,42 Q58,34 57,24" stroke="#78909C" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Neck muscle lines -->
  <path d="M47,38 Q44,30 45,20" stroke="#ECEFF1" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M53,38 Q56,30 55,20" stroke="#CFD8DC" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Gold collar armor ring -->
  <path d="M44,43 Q50,40 56,43 Q55,47 50,48 Q45,47 44,43 Z" fill="url(#nwS_gold)" filter="url(#nwS_glow)"/>

  <!-- NOBLE HORSE HEAD -->
  <path d="M42,22 Q38,16 40,9 Q43,3 50,2 Q57,3 60,9 Q62,16 58,22 Q55,28 50,30 Q45,28 42,22 Z"
        fill="url(#nwS_horse)" filter="url(#nwS_depth)"/>
  <path d="M42,22 Q38,16 40,9 Q43,3 50,2 Q57,3 60,9 Q62,16 58,22 Q55,28 50,30 Q45,28 42,22 Z"
        fill="url(#nwS_shadow)"/>
  <!-- Head muscle definition -->
  <path d="M43,22 Q40,16 42,10" stroke="#ECEFF1" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M57,22 Q60,16 58,10" stroke="#CFD8DC" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- HORSE MUZZLE (elongated snout) -->
  <path d="M44,24 Q40,24 38,27 Q37,31 40,33 Q44,35 50,35 Q56,35 60,33 Q63,31 62,27 Q60,24 56,24 Z"
        fill="url(#nwS_horse)" filter="url(#nwS_depth)"/>
  <path d="M44,24 Q40,24 38,27 Q37,31 40,33 Q44,35 50,35 Q56,35 60,33 Q63,31 62,27 Q60,24 56,24 Z"
        fill="url(#nwS_shadow)" opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="43" cy="31" rx="2.5" ry="1.8" fill="#78909C" opacity="0.6"/>
  <ellipse cx="57" cy="31" rx="2.5" ry="1.8" fill="#78909C" opacity="0.6"/>
  <ellipse cx="43" cy="31" rx="1.5" ry="1" fill="#455A64" opacity="0.7"/>
  <ellipse cx="57" cy="31" rx="1.5" ry="1" fill="#455A64" opacity="0.7"/>
  <!-- Mouth line -->
  <path d="M41,34 Q50,36 59,34" stroke="#78909C" stroke-width="0.7" fill="none"/>

  <!-- NOBLE BLUE EYES -->
  <ellipse cx="44" cy="19" rx="3.5" ry="3" fill="url(#nwS_eye)" filter="url(#nwS_glow)"/>
  <ellipse cx="56" cy="19" rx="3.5" ry="3" fill="url(#nwS_eye)" filter="url(#nwS_glow)"/>
  <ellipse cx="44" cy="19" rx="2" ry="1.7" fill="#1565C0"/>
  <ellipse cx="56" cy="19" rx="2" ry="1.7" fill="#1565C0"/>
  <circle cx="43.5" cy="18.5" r="0.8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="55.5" cy="18.5" r="0.8" fill="#FFFFFF" opacity="0.9"/>
  <!-- Eyelash/brow -->
  <path d="M41,17 Q44,15.5 47,17" stroke="#78909C" stroke-width="0.7" fill="none"/>
  <path d="M53,17 Q56,15.5 59,17" stroke="#78909C" stroke-width="0.7" fill="none"/>

  <!-- FLOWING MANE (white elegant) -->
  <path d="M58,22 Q64,18 66,12 Q65,8 62,9 Q60,12 58,18" fill="#ECEFF1" opacity="0.8"/>
  <path d="M58,20 Q65,16 67,10 Q63,7 59,11" stroke="#CFD8DC" stroke-width="0.5" fill="none" opacity="0.6"/>
  <path d="M56,14 Q63,12 64,7" stroke="#ECEFF1" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M55,10 Q62,9 63,5" stroke="#CFD8DC" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- ARMOR HELMET on head (knight armor) -->
  <!-- Helm piece on forehead -->
  <rect x="40" y="8" width="20" height="5" rx="2" fill="url(#nwS_armor)" opacity="0.8"/>
  <rect x="42" y="8" width="16" height="3" rx="1.5" fill="#ECEFF1" opacity="0.4"/>
  <!-- Nasal guard -->
  <rect x="48.5" y="8" width="3" height="16" rx="1.5" fill="url(#nwS_armor)" opacity="0.7"/>
  <!-- Gold trim on helm -->
  <line x1="40" y1="8" x2="60" y2="8" stroke="#FFD54F" stroke-width="0.8" opacity="0.8"/>
  <!-- Helm crest -->
  <path d="M44,8 Q50,3 56,8" fill="none" stroke="url(#nwS_gold)" stroke-width="1.5"/>
  <!-- Plume (white feather) -->
  <path d="M50,3 Q48,0 46,1 Q44,2 47,5 Q49,7 50,3" fill="#ECEFF1" opacity="0.7"/>
  <path d="M50,3 Q52,0 54,1 Q56,2 53,5 Q51,7 50,3" fill="#CFD8DC" opacity="0.6"/>
</svg>
