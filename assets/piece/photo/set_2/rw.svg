<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="rw_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFEF0"/>
      <stop offset="40%" stop-color="#F5E6B0"/>
      <stop offset="80%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="rw_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rw_top" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F5E6B0"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="95" rx="22" ry="4" fill="#B8860B" opacity="0.35"/>

  <!-- Base -->
  <ellipse cx="50" cy="88" rx="22" ry="5.5" fill="url(#rw_body)"/>
  <ellipse cx="50" cy="86" rx="22" ry="5.5" fill="url(#rw_body)"/>
  <rect x="28" y="82" width="44" height="4" rx="1" fill="url(#rw_body)"/>
  <ellipse cx="50" cy="82" rx="22" ry="4" fill="#F5E6B0"/>
  <ellipse cx="50" cy="82" rx="20" ry="3.2" fill="url(#rw_body)"/>

  <!-- Lower body column -->
  <path d="M31 82 Q30 70 32 60 Q35 53 50 52 Q65 53 68 60 Q70 70 69 82 Z" fill="url(#rw_body)"/>
  <path d="M31 82 Q30 70 32 60 Q35 53 50 52 Q65 53 68 60 Q70 70 69 82 Z" fill="url(#rw_shine)" opacity="0.4"/>

  <!-- Mid band ring -->
  <ellipse cx="50" cy="64" rx="16" ry="2.5" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="50" cy="64" rx="14" ry="1.8" fill="#FFD700" opacity="0.4"/>

  <!-- Upper column -->
  <rect x="34" y="32" width="32" height="22" rx="3" fill="url(#rw_body)"/>
  <rect x="34" y="32" width="32" height="22" rx="3" fill="url(#rw_shine)" opacity="0.35"/>

  <!-- Neck transition -->
  <ellipse cx="50" cy="54" rx="16" ry="3" fill="#D4A843"/>
  <ellipse cx="50" cy="53" rx="15" ry="2" fill="#FFD700" opacity="0.5"/>

  <!-- Top battlement platform -->
  <rect x="30" y="22" width="40" height="10" rx="2" fill="url(#rw_top)"/>
  <rect x="30" y="22" width="40" height="10" rx="2" fill="url(#rw_shine)" opacity="0.4"/>

  <!-- Battlements (merlons) - castle top -->
  <rect x="30" y="15" width="9" height="9" rx="1.5" fill="url(#rw_body)"/>
  <rect x="30" y="15" width="9" height="9" rx="1.5" fill="url(#rw_shine)" opacity="0.5"/>
  <rect x="42" y="15" width="9" height="9" rx="1.5" fill="url(#rw_body)"/>
  <rect x="42" y="15" width="9" height="9" rx="1.5" fill="url(#rw_shine)" opacity="0.5"/>
  <rect x="54" y="15" width="9" height="9" rx="1.5" fill="url(#rw_body)"/>
  <rect x="54" y="15" width="9" height="9" rx="1.5" fill="url(#rw_shine)" opacity="0.5"/>
  <!-- Merlon gap windows -->
  <rect x="39" y="16" width="3" height="7" rx="1" fill="#B8860B" opacity="0.5"/>
  <rect x="51" y="16" width="3" height="7" rx="1" fill="#B8860B" opacity="0.5"/>

  <!-- Gold trim line on battlement -->
  <rect x="30" y="21" width="40" height="2" rx="1" fill="#FFD700" opacity="0.7"/>

  <!-- Body highlight -->
  <ellipse cx="43" cy="67" rx="3" ry="6" fill="#FFFFFF" opacity="0.2" transform="rotate(-15,43,67)"/>
  <ellipse cx="40" cy="42" rx="2.5" ry="7" fill="#FFFFFF" opacity="0.25" transform="rotate(-10,40,42)"/>
</svg>
