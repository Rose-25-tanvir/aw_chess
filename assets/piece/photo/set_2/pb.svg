<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="pb_body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4A0A0A"/>
      <stop offset="40%" stop-color="#2D0505"/>
      <stop offset="80%" stop-color="#1A0202"/>
      <stop offset="100%" stop-color="#0D0101"/>
    </radialGradient>
    <radialGradient id="pb_head" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7A1010"/>
      <stop offset="40%" stop-color="#4A0A0A"/>
      <stop offset="80%" stop-color="#1A0202"/>
      <stop offset="100%" stop-color="#0A0000"/>
    </radialGradient>
    <linearGradient id="pb_shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#CC2222" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#CC2222" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pb_gem" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="40%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#6B0000"/>
    </radialGradient>
    <filter id="pb_glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="95" rx="19" ry="4" fill="#CC0000" opacity="0.25"/>

  <!-- Base platform -->
  <ellipse cx="50" cy="88" rx="19" ry="5" fill="url(#pb_body)"/>
  <ellipse cx="50" cy="86" rx="19" ry="5" fill="url(#pb_body)"/>
  <rect x="31" y="83" width="38" height="3" rx="1" fill="url(#pb_body)"/>
  <ellipse cx="50" cy="83" rx="19" ry="3.5" fill="#3D0808"/>
  <ellipse cx="50" cy="83" rx="17" ry="2.8" fill="url(#pb_body)"/>

  <!-- Lower body -->
  <path d="M34 83 Q33 76 36 70 Q40 64 50 63 Q60 64 64 70 Q67 76 66 83 Z" fill="url(#pb_body)"/>
  <path d="M34 83 Q33 76 36 70 Q40 64 50 63 Q60 64 64 70 Q67 76 66 83 Z" fill="url(#pb_shine)" opacity="0.5"/>

  <!-- Waist stem -->
  <path d="M40 63 Q38 58 40 53 Q43 48 50 47 Q57 48 60 53 Q62 58 60 63 Z" fill="url(#pb_body)"/>
  <path d="M40 63 Q38 58 40 53 Q43 48 50 47 Q57 48 60 53 Q62 58 60 53 Z" fill="url(#pb_shine)" opacity="0.4"/>

  <!-- Waist band with dark red -->
  <ellipse cx="50" cy="63" rx="11" ry="2.2" fill="#8B0000" opacity="0.95"/>
  <ellipse cx="50" cy="63" rx="9.5" ry="1.5" fill="#CC0000" opacity="0.5"/>

  <!-- Collar ring -->
  <ellipse cx="50" cy="47" rx="10" ry="2.5" fill="#8B0000" opacity="0.9"/>
  <ellipse cx="50" cy="46.5" rx="8.5" ry="1.8" fill="#CC0000" opacity="0.5"/>

  <!-- Head sphere - dark with red glow -->
  <circle cx="50" cy="36" r="13" fill="url(#pb_head)"/>
  <circle cx="50" cy="36" r="13" fill="url(#pb_shine)" opacity="0.5"/>

  <!-- Crown gem on top - red glowing ruby -->
  <circle cx="50" cy="24" r="4" fill="url(#pb_gem)" filter="url(#pb_glow)"/>
  <circle cx="50" cy="24" r="2.2" fill="#FF8888" opacity="0.9"/>

  <!-- Red highlight on head -->
  <ellipse cx="44" cy="31" rx="3.5" ry="4.5" fill="#FF4444" opacity="0.2" transform="rotate(-20,44,31)"/>

  <!-- Body lower highlight -->
  <ellipse cx="42" cy="75" rx="2" ry="4" fill="#FF4444" opacity="0.15" transform="rotate(-15,42,75)"/>
</svg>
